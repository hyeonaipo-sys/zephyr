#bg-shimmer{position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse at 22% 22%,rgba(255,255,255,0.88) 0%,transparent 28%),radial-gradient(ellipse at 78% 55%,rgba(255,255,255,0.72) 0%,transparent 22%),radial-gradient(ellipse at 50% 6%,rgba(255,255,255,0.80) 0%,transparent 20%),linear-gradient(118deg,rgba(255,255,255,0.30) 0%,transparent 40%);opacity:0;transition:opacity .5s;}
body.theme-green #bg-shimmer{opacity:1;}
#bg-aurora{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:0;transition:opacity .6s;}
body.theme-aurora #bg-aurora{opacity:1;}
#bg-night{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:0;transition:opacity .6s;}
body.theme-night #bg-night{opacity:1;}
#bg-bubbles{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;opacity:0;transition:opacity .5s;}
body.theme-green #bg-bubbles{opacity:1;}
.bbl{position:absolute;border-radius:50%;border:1px solid rgba(255,255,255,0.70);animation:brise linear infinite;}
.bbl::after{content:'';position:absolute;width:32%;height:26%;top:16%;left:18%;border-radius:50%;background:rgba(255,255,255,0.65);}
@keyframes brise{0%{bottom:-50px;opacity:0;transform:translateX(0);}10%{opacity:.9;}50%{transform:translateX(9px);}90%{opacity:.35;}100%{bottom:110%;opacity:0;transform:translateX(-5px);}}

.shell{max-width:420px;margin:0 auto;height:100vh;display:flex;flex-direction:column;overflow:hidden;position:relative;z-index:1;}
@media(min-width:480px){.shell{border-radius:28px;margin:20px auto;height:calc(100vh - 40px);}}
.shell::before{content:'';position:absolute;top:0;left:8%;right:8%;height:1.5px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.96),transparent);z-index:20;border-radius:50%;}
body.theme-green  .shell{background:rgba(255,255,255,0.055);border:1px solid rgba(255,255,255,0.80);box-shadow:0 8px 48px rgba(90,175,110,0.14),inset 0 1.5px 0 rgba(255,255,255,0.92);}
body.theme-aurora .shell{background:rgba(255,255,255,0.038);border:1px solid rgba(255,255,255,0.16);box-shadow:0 8px 48px rgba(20,160,130,0.22),inset 0 1.5px 0 rgba(255,255,255,0.22);}
body.theme-night  .shell{background:rgba(255,255,255,0.030);border:1px solid rgba(255,255,255,0.10);box-shadow:0 8px 48px rgba(20,30,100,0.38),inset 0 1.5px 0 rgba(255,255,255,0.16);}

body.theme-green  .card{background:rgba(255,255,255,0.82);border:1px solid rgba(200,230,190,0.80);box-shadow:0 2px 12px rgba(0,0,0,0.06);}
body.theme-aurora .card{background:rgba(8,25,35,0.90);border:1px solid rgba(40,200,160,0.22);box-shadow:0 2px 12px rgba(0,0,0,0.20);}
body.theme-night  .card{background:rgba(12,16,50,0.92);border:1px solid rgba(100,120,255,0.18);box-shadow:0 2px 12px rgba(0,0,0,0.25);}

body.theme-green  .t1{color:rgba(10,52,16,0.85);}
body.theme-aurora .t1{color:rgba(200,255,238,0.92);}
body.theme-night  .t1{color:rgba(215,222,255,0.92);}
body.theme-green  .t2{color:rgba(25,78,30,0.46);}
body.theme-aurora .t2{color:rgba(120,230,200,0.50);}
body.theme-night  .t2{color:rgba(148,160,230,0.50);}
body.theme-green  .t3{color:rgba(8,48,14,0.88);}
body.theme-aurora .t3{color:rgba(190,255,232,0.88);}
body.theme-night  .t3{color:rgba(208,215,255,0.90);}

#screen-map{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.map-header{padding:24px 20px 12px;display:flex;justify-content:space-between;align-items:flex-end;flex-shrink:0;}
.logo{font-family:'Fragille','Roses Bolero',Georgia,serif !important;font-style:normal;font-size:34px;font-weight:400;letter-spacing:0.06em;}
.logo-sub{font-size:9px;letter-spacing:0.14em;text-transform:uppercase;margin-top:2px;}
.add-btn{width:34px;height:34px;border-radius:50%;border:1px solid rgba(255,255,255,0.68);box-shadow:inset 0 1.5px 0 rgba(255,255,255,0.88);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:opacity .2s;flex-shrink:0;}
.add-btn:hover{opacity:.72;}
.add-btn svg{width:13px;height:13px;fill:none;stroke-width:2.5;stroke-linecap:round;}
body.theme-green  .add-btn{background:rgba(255,255,255,0.32);}
body.theme-aurora .add-btn{background:rgba(0,0,0,0.30);}
body.theme-night  .add-btn{background:rgba(0,0,0,0.35);}
body.theme-green  .add-btn svg{stroke:rgba(10,65,18,0.68);}
body.theme-aurora .add-btn svg{stroke:rgba(180,255,235,0.80);}
body.theme-night  .add-btn svg{stroke:rgba(200,210,255,0.80);}

.stat-row{display:flex;gap:6px;padding:0 20px 12px;flex-shrink:0;}
.stat-card{flex:1;border-radius:13px;padding:10px 11px;}
.stat-num{font-size:19px;font-weight:500;letter-spacing:-0.02em;}
.stat-lbl{font-size:8px;letter-spacing:0.09em;text-transform:uppercase;margin-top:2px;}
#map{flex:1;min-height:200px;z-index:1;}
.list-wrap{flex-shrink:0;max-height:37vh;overflow-y:auto;}
.list-header{padding:12px 20px 8px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:2;border-bottom:0.5px solid rgba(255,255,255,0.16);}
body.theme-green  .list-header{background:rgba(215,252,190,0.35);}
body.theme-aurora .list-header{background:rgba(2,8,16,0.50);}
body.theme-night  .list-header{background:rgba(3,5,26,0.55);}
.list-title{font-size:10px;letter-spacing:0.11em;text-transform:uppercase;}
.trip-list{padding:8px 20px 18px;display:flex;flex-direction:column;gap:7px;}
.trip-row{display:flex;align-items:center;gap:12px;padding:11px 13px;border-radius:14px;cursor:pointer;transition:all .16s;}
.trip-row:hover{transform:translateX(3px);}
.trip-thumb{width:40px;height:40px;border-radius:10px;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,0.18);}
.trip-info{flex:1;}
.trip-name{font-size:13px;font-weight:500;}
.trip-meta{font-size:11px;margin-top:2px;}
.trip-chevron{font-size:15px;opacity:.32;}

.wand-marker{display:flex;flex-direction:column;align-items:center;}
.wand-dot{width:12px;height:12px;border-radius:50%;border:2.5px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,0.25);}
body.theme-green  .wand-dot{background:rgba(14,82,22,0.75);}
body.theme-aurora .wand-dot{background:rgba(40,220,170,0.90);}
body.theme-night  .wand-dot{background:rgba(170,185,255,0.90);}
.wand-label{font-family:var(--sans);font-size:10px;font-weight:500;padding:2px 8px;border-radius:20px;margin-top:3px;white-space:nowrap;box-shadow:0 1px 5px rgba(0,0,0,0.20);pointer-events:none;}
body.theme-green  .wand-label{background:rgba(255,255,255,0.75);color:rgba(8,52,14,0.92);border:0.5px solid rgba(255,255,255,0.90);}
body.theme-aurora .wand-label{background:rgba(5,25,25,0.82);color:rgba(160,255,220,0.95);border:0.5px solid rgba(40,200,160,0.35);}
body.theme-night  .wand-label{background:rgba(8,10,42,0.82);color:rgba(195,205,255,0.95);border:0.5px solid rgba(140,155,255,0.30);}

.leaflet-control-zoom{border:0.5px solid rgba(255,255,255,0.28)!important;border-radius:12px!important;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.15)!important;}
body.theme-green  .leaflet-control-zoom a{background:rgba(255,255,255,0.60)!important;color:rgba(10,55,16,0.85)!important;}
body.theme-aurora .leaflet-control-zoom a{background:rgba(5,20,20,0.78)!important;color:rgba(140,248,215,0.90)!important;}
body.theme-night  .leaflet-control-zoom a{background:rgba(10,14,50,0.78)!important;color:rgba(180,195,255,0.90)!important;}
.leaflet-control-attribution{font-size:8px!important;background:transparent!important;color:rgba(255,255,255,0.25)!important;box-shadow:none!important;padding:1px 4px!important;}
.leaflet-control-attribution a{color:rgba(255,255,255,0.25)!important;}

#screen-detail{flex:1;display:none;flex-direction:column;overflow-y:auto;}
.hero{height:292px;position:relative;flex-shrink:0;overflow:hidden;}
.hero-bg{position:absolute;inset:0;}
.hero-grad{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.82) 0%,rgba(0,0,0,0.06) 58%,transparent 100%);}
.back-btn{position:absolute;top:16px;left:16px;z-index:5;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.16);border:0.5px solid rgba(255,255,255,0.35);cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(6px);transition:background .15s;}
.back-btn:hover{background:rgba(255,255,255,0.26);}
.back-btn svg{width:16px;height:16px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.hero-content{position:absolute;bottom:0;left:0;right:0;padding:22px;z-index:2;}
.hero-vol{font-size:9px;letter-spacing:0.20em;text-transform:uppercase;color:rgba(255,255,255,0.42);margin-bottom:6px;}
.hero-city{font-family:'Glamour Actual','Noto Sans KR',Georgia,sans-serif;font-size:46px;font-weight:700;color:#fff;line-height:1.0;display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;}
.hero-city-en{font-family:'Glamour Actual',Georgia,serif;font-style:italic;font-size:18px;font-weight:400;color:rgba(255,255,255,0.52);letter-spacing:0.01em;}
.hero-dates{font-size:10px;color:rgba(255,255,255,0.42);margin-top:10px;letter-spacing:0.09em;text-transform:uppercase;}
.film-strip{display:flex;gap:2px;height:86px;flex-shrink:0;overflow:hidden;}
.film-frame{flex:1;overflow:hidden;cursor:pointer;transition:flex .28s ease;}
.film-frame:hover{flex:1.75;}
.detail-body{padding:22px 20px;}
body.theme-green  .detail-body{background:#f0f7e8;}
body.theme-aurora .detail-body{background:#06101a;}
body.theme-night  .detail-body{background:#070a20;}
.pull-q{padding-left:15px;margin-bottom:22px;}
body.theme-green  .pull-q{border-left:2px solid rgba(30,120,40,0.50);}
body.theme-aurora .pull-q{border-left:2px solid rgba(40,220,170,0.60);}
body.theme-night  .pull-q{border-left:2px solid rgba(130,150,255,0.55);}
.pull-q-text{font-family:var(--serif);font-style:italic;font-size:19px;line-height:1.5;}
.pull-q-attr{font-size:10px;letter-spacing:0.09em;text-transform:uppercase;margin-top:7px;opacity:.50;}
.divider{height:0.5px;background:rgba(255,255,255,0.18);margin:18px 0;}
.sec-label{font-size:10px;letter-spacing:0.13em;text-transform:uppercase;opacity:.40;margin-bottom:12px;}
.tl-wrap{position:relative;}
.tl-spine{position:absolute;left:3px;top:8px;bottom:0;width:1px;background:rgba(255,255,255,0.18);}
.tl-days{padding-left:24px;display:flex;flex-direction:column;gap:14px;}
.tl-day-lbl{font-size:11px;font-weight:500;margin-bottom:8px;display:flex;align-items:center;gap:9px;opacity:.72;}
.tl-day-lbl::before{content:'';width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,0.12);border:1.5px solid rgba(255,255,255,0.38);flex-shrink:0;margin-left:-27px;}
.tl-events{display:flex;flex-direction:column;gap:5px;}
.tl-event{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;}
.tl-icon{font-size:14px;flex-shrink:0;}
.tl-text{font-size:12px;flex:1;}
.tl-time{font-size:10px;opacity:.48;}
.photo-grid{display:grid;grid-template-columns:2fr 1fr;grid-template-rows:110px 110px;gap:3px;border-radius:12px;overflow:hidden;margin-top:18px;}
.pg-item.tall{grid-row:span 2;}
.memo-sec{margin-top:22px;}
.memo-card{border-radius:14px;padding:16px;}
body.theme-green  .memo-card{background:rgba(255,255,255,0.82);border:1px solid rgba(200,230,190,0.80);}
body.theme-aurora .memo-card{background:rgba(8,25,35,0.90);border:1px solid rgba(40,200,160,0.22);}
body.theme-night  .memo-card{background:rgba(12,16,50,0.92);border:1px solid rgba(100,120,255,0.18);}
.memo-lbl{font-size:9px;letter-spacing:0.13em;text-transform:uppercase;opacity:.40;margin-bottom:10px;}
.memo-text{font-family:var(--serif);font-size:15px;line-height:1.80;opacity:.78;}
.memo-mood{display:inline-block;font-size:10px;margin-top:10px;padding:4px 11px;border-radius:20px;font-weight:500;border:0.5px solid rgba(255,255,255,0.28);background:rgba(255,255,255,0.12);}
.detail-spacer{height:44px;}

/* ── 어시스티브 터치 스타일 ── */
.assist-wrap{position:fixed;bottom:40px;right:24px;z-index:200;}

/* 기본 동그라미 버튼 */
.assist-dot{
  width:44px;height:44px;border-radius:50%;
  background:rgba(255,255,255,0.18);
  border:1px solid rgba(255,255,255,0.45);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  box-shadow:0 4px 20px rgba(0,0,0,0.20);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:20px;transition:all .2s;
  user-select:none;
  animation:assistPulse 3s ease-in-out infinite;
}
@keyframes assistPulse{
  0%,100%{box-shadow:0 4px 20px rgba(0,0,0,0.20),0 0 0 0 rgba(255,255,255,0.15);}
  50%{box-shadow:0 4px 20px rgba(0,0,0,0.20),0 0 0 6px rgba(255,255,255,0.0);}
}
.assist-dot:hover{background:rgba(255,255,255,0.26);animation:none;}
.assist-dot:active{transform:scale(0.94);animation:none;}

/* 펼쳐진 메뉴 패널 */
.assist-panel{
  position:absolute;bottom:54px;right:0;
  background:rgba(20,20,30,0.72);
  border:1px solid rgba(255,255,255,0.22);
  border-radius:20px;padding:10px;
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  box-shadow:0 8px 32px rgba(0,0,0,0.30);
  display:flex;flex-direction:column;gap:6px;
  opacity:0;transform:scale(0.85) translateY(10px);transform-origin:bottom right;
  pointer-events:none;transition:all .22s cubic-bezier(.34,1.56,.64,1);
  min-width:180px;
}
.assist-panel.open{
  opacity:1;transform:scale(1) translateY(0);pointer-events:all;
}

/* 섹션 라벨 */
.ap-label{font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.35);padding:2px 6px;margin-top:4px;}
.ap-label:first-child{margin-top:0;}

/* 테마 행 */
.ap-themes{display:flex;gap:6px;padding:2px 4px;}
.t-btn{width:36px;height:36px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:all .2s;font-size:17px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.08);}
.t-btn.active{border-color:rgba(255,255,255,0.88);background:rgba(255,255,255,0.18);transform:scale(1.12);}
.t-btn:hover{transform:scale(1.08);}

/* 설정 버튼들 */
.ap-btn{
  display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:12px;
  cursor:pointer;transition:background .15s;font-family:'Noto Sans KR',sans-serif;font-size:13px;
  color:rgba(255,255,255,0.85);background:transparent;border:none;width:100%;text-align:left;
}
.ap-btn:hover{background:rgba(255,255,255,0.10);}
.ap-btn-icon{font-size:16px;width:22px;text-align:center;}
.ap-divider{height:0.5px;background:rgba(255,255,255,0.12);margin:2px 0;}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.50);z-index:999;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{border-radius:24px 24px 0 0;padding:22px 22px 40px;width:100%;max-width:420px;max-height:90vh;overflow-y:auto;backdrop-filter:blur(32px);}
body.theme-green  .modal{background:rgba(215,252,190,0.78);}
body.theme-aurora .modal{background:rgba(3,12,20,0.88);}
body.theme-night  .modal{background:rgba(5,8,30,0.90);}
.modal-handle{width:36px;height:3px;background:rgba(255,255,255,0.30);border-radius:2px;margin:0 auto 20px;}
.modal-title{font-family:var(--serif);font-size:24px;margin-bottom:20px;}
.m-field{margin-bottom:12px;}
.m-label{font-size:10px;letter-spacing:0.11em;text-transform:uppercase;opacity:.48;margin-bottom:6px;}
.m-input{width:100%;border:1px solid rgba(255,255,255,0.28);border-radius:10px;padding:12px 14px;font-family:var(--sans);font-size:13px;background:rgba(255,255,255,0.10);outline:none;transition:border-color .15s;}
.m-input:focus{border-color:rgba(255,255,255,0.60);}
body.theme-green  .m-input{color:rgba(10,52,16,0.88);}
body.theme-aurora .m-input{color:rgba(190,255,232,0.90);}
body.theme-night  .m-input{color:rgba(208,215,255,0.90);}
.m-textarea{height:80px;resize:none;line-height:1.65;}
.mood-row{display:flex;gap:7px;flex-wrap:wrap;}
.mood-pill{padding:6px 14px;border-radius:20px;border:1px solid rgba(255,255,255,0.25);background:rgba(255,255,255,0.08);font-size:11px;cursor:pointer;font-family:var(--sans);transition:all .15s;}
.mood-pill.sel{background:rgba(255,255,255,0.28);border-color:rgba(255,255,255,0.68);}
body.theme-green  .mood-pill{color:rgba(10,52,16,0.75);}
body.theme-aurora .mood-pill{color:rgba(170,250,222,0.75);}
body.theme-night  .mood-pill{color:rgba(185,198,255,0.75);}
.m-save{width:100%;background:rgba(255,255,255,0.18);border:1px solid rgba(255,255,255,0.45);border-radius:12px;padding:15px;font-family:var(--sans);font-size:13px;font-weight:500;cursor:pointer;margin-top:18px;transition:opacity .2s;}
.m-save:hover{opacity:.75;}
body.theme-green  .m-save{color:rgba(10,52,16,0.88);}
body.theme-aurora .m-save{color:rgba(190,255,232,0.90);}
body.theme-night  .m-save{color:rgba(208,215,255,0.90);}

body.theme-aurora #screen-editor { background:#06101a; }

<script>

const FC=[[['#4AAFA0','#1A6B8A'],['#E8A87C','#C4714A'],['#7BA8C4','#4A7A9A'],['#b8d0c0','#88a898']],[['#c8b8a8','#988070'],['#d8c8b8','#a89080'],['#b8a898','#887870'],['#c8d0b8','#98a888']],[['#c0a8c8','#907898'],['#d0b8d0','#a088a0'],['#b8a8c0','#887890'],['#c8b8d0','#9888a8']],[['#6B9E5A','#2D5A1E'],['#8ab878','#5a8848'],['#a8c898','#789868'],['#c8d8b8','#98a888']]];
const trips=[];

// ── 핀 아이콘 설정 ──
window._pinIcon = '📍';
const DEFAULT_PINS = ['📍','⭐','❤️','✈️','🌸','👣','🏔️','🌊','🌴','☕','🎨','🍜','🎭','🏨','🔥'];

// ── 설정 기능 ──
let _fontSize = 'normal'; // normal | large
function toggleFontSize(){
  _fontSize = _fontSize === 'normal' ? 'large' : 'normal';
  document.body.style.fontSize = _fontSize === 'large' ? '18px' : '';
  const btn = document.querySelector('.ap-btn .ap-btn-icon + span') ;

}

let _mapStyle = 'default';
// ── 지구본 ──
let _globeInstance = null;

function openGlobe(){
  const overlay = document.getElementById('globeOverlay');
  overlay.style.display = 'flex';
  if(!document.getElementById('threeScript')){
    const s = document.createElement('script');
    s.id = 'threeScript';
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js';
    s.onload = () => initGlobe();
    document.head.appendChild(s);
  } else {
    initGlobe();
  }
}

function initGlobe(){
  const mount = document.getElementById('globeMount');
  mount.innerHTML = '';
  const W = mount.offsetWidth || window.innerWidth;
  const H = mount.offsetHeight || window.innerHeight;

  // Scene
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(45, W/H, 0.1, 1000);
  camera.position.z = 2.5;

  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(W, H);
  renderer.setClearColor(0x020810, 1);
  mount.appendChild(renderer.domElement);

  // 별 배경
  const starGeo = new THREE.BufferGeometry();
  const starVerts = [];
  for(let i=0;i<6000;i++){
    const theta = Math.random()*Math.PI*2;
    const phi = Math.acos(2*Math.random()-1);
    const r = 80 + Math.random()*20;
    starVerts.push(r*Math.sin(phi)*Math.cos(theta), r*Math.sin(phi)*Math.sin(theta), r*Math.cos(phi));
  }
  starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starVerts, 3));
  scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({color:0xffffff, size:0.18, sizeAttenuation:true})));

  // 지구
  const geo = new THREE.SphereGeometry(1, 64, 64);
  const loader = new THREE.TextureLoader();
  const mat = new THREE.MeshPhongMaterial({ shininess: 15 });

  // 텍스처 로드 (실패해도 파란 지구로 fallback)
  // NASA 공개 텍스처
  const earthUrl = 'https://eoimages.gsfc.nasa.gov/images/imagerecords/73000/73909/world.topo.bathy.200412.3x5400x2700.jpg';
  loader.crossOrigin = '';
  loader.load(earthUrl,
    tex => { mat.map = tex; mat.needsUpdate = true; },
    undefined,
    () => {
      // fallback: Natural Earth
      loader.load('https://raw.githubusercontent.com/turban/webgl-earth/master/images/2_no_clouds_4k.jpg',
        tex => { mat.map = tex; mat.needsUpdate = true; },
        undefined,
        () => {
          // 최종 fallback: canvas
          mat.color.set(0x2266aa); mat.needsUpdate = true;
        }
      );
    }
  );

  const earth = new THREE.Mesh(geo, mat);
  scene.add(earth);

  // 구름
  const cloudMat = new THREE.MeshPhongMaterial({ transparent: true, opacity: 0.25, depthWrite: false });
  loader.load('https://raw.githubusercontent.com/turban/webgl-earth/master/images/fair_clouds_4k.png',
    tex => { cloudMat.map = tex; cloudMat.needsUpdate = true; },
    undefined,
    () => {
      cloudMat.opacity = 0; // 로드 실패시 구름 숨기기
    }
  );
  const clouds = new THREE.Mesh(new THREE.SphereGeometry(1.006, 64, 64), cloudMat);
  scene.add(clouds);

  // 조명
  scene.add(new THREE.AmbientLight(0xffffff, 0.4));
  const sun = new THREE.DirectionalLight(0xffffff, 1.0);
  sun.position.set(5, 3, 5);
  scene.add(sun);

  // 여행 핀
  const pinColor = currentTheme()==='green' ? 0x2ecc71 : currentTheme()==='aurora' ? 0x28dca8 : 0x8899ff;
  const pinMat = new THREE.MeshBasicMaterial({ color: pinColor });
  const pinObjs = [];

  trips.forEach(t => {
    const phi = (90 - t.lat) * Math.PI/180;
    const theta = (t.lng + 180) * Math.PI/180;
    const r = 1.04;
    const x = -r * Math.sin(phi)*Math.cos(theta);
    const y = r * Math.cos(phi);
    const z = r * Math.sin(phi)*Math.sin(theta);
    // 글로우 원
    const pin = new THREE.Mesh(new THREE.SphereGeometry(0.022, 12, 12), pinMat.clone());
    pin.position.set(x, y, z);
    pin.userData = { city: t.city, date: t.date };
    scene.add(pin);
    // 링
    const ring = new THREE.Mesh(
      new THREE.RingGeometry(0.028, 0.036, 24),
      new THREE.MeshBasicMaterial({ color: pinColor, side: THREE.DoubleSide, transparent: true, opacity: 0.6 })
    );
    ring.position.set(x, y, z);
    ring.lookAt(0, 0, 0);
    scene.add(ring);
    pinObjs.push(pin);
  });

  // 마우스 드래그 회전
  let isDragging = false, prevX = 0, prevY = 0;
  let rotX = 0, rotY = 0, velX = 0, velY = 0;

  const canvas = renderer.domElement;
  canvas.addEventListener('mousedown', e => { isDragging=true; prevX=e.clientX; prevY=e.clientY; velX=velY=0; });
  window.addEventListener('mousemove', e => {
    if(!isDragging) return;
    velX = (e.clientX-prevX)*0.005; velY = (e.clientY-prevY)*0.005;
    rotY += velX; rotX += velY;
    prevX=e.clientX; prevY=e.clientY;
  });
  window.addEventListener('mouseup', () => { isDragging=false; });

  // 터치
  let lastTouchX=0, lastTouchY=0, lastDist=0;
  canvas.addEventListener('touchstart', e => {
    if(e.touches.length===1){ lastTouchX=e.touches[0].clientX; lastTouchY=e.touches[0].clientY; velX=velY=0; }
    if(e.touches.length===2){ lastDist = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY); }
  }, {passive:true});
  canvas.addEventListener('touchmove', e => {
    if(e.touches.length===1){
      velX=(e.touches[0].clientX-lastTouchX)*0.005; velY=(e.touches[0].clientY-lastTouchY)*0.005;
      rotY+=velX; rotX+=velY;
      lastTouchX=e.touches[0].clientX; lastTouchY=e.touches[0].clientY;
    }
    if(e.touches.length===2){
      const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
      camera.position.z *= lastDist/d; camera.position.z=Math.max(1.4,Math.min(6,camera.position.z));
      lastDist=d;
    }
  }, {passive:true});

  // 마우스휠 줌
  canvas.addEventListener('wheel', e => {
    camera.position.z += e.deltaY*0.002;
    camera.position.z = Math.max(1.4, Math.min(6, camera.position.z));
  }, {passive:true});

  // 핀 클릭 raycasting
  const raycaster = new THREE.Raycaster();
  const mouse = new THREE.Vector2();
  canvas.addEventListener('click', e => {
    const rect = canvas.getBoundingClientRect();
    mouse.x = ((e.clientX-rect.left)/rect.width)*2-1;
    mouse.y = -((e.clientY-rect.top)/rect.height)*2+1;
    raycaster.setFromCamera(mouse, camera);
    const hits = raycaster.intersectObjects(pinObjs);
    if(hits.length){
      const d = hits[0].object.userData;
      const label = document.getElementById('globeTripLabel');
      label.textContent = `${window._pinIcon||'📍'} ${d.city}  ·  ${d.date}`;
      label.style.opacity='1';
      setTimeout(()=>label.style.opacity='0', 2800);
    }
  });

  // 리사이즈
  function onResize(){
    const w=mount.offsetWidth, h=mount.offsetHeight;
    camera.aspect=w/h; camera.updateProjectionMatrix();
    renderer.setSize(w, h);
  }
  window.addEventListener('resize', onResize);

  // 애니메이션
  let animId;
  function animate(){
    animId = requestAnimationFrame(animate);
    if(!isDragging){ velX*=0.95; velY*=0.95; rotY+=velX; rotX+=velY; }
    // 자동 회전 (드래그 없을 때)
    if(Math.abs(velX)<0.0005 && Math.abs(velY)<0.0005 && !isDragging) rotY += 0.003;
    earth.rotation.y = rotY;
    earth.rotation.x = Math.max(-1.2, Math.min(1.2, rotX));
    clouds.rotation.y = rotY + 0.0005;
    clouds.rotation.x = earth.rotation.x;
    renderer.render(scene, camera);
  }
  animate();

  window._globeInstance = { animId, renderer, onResize };
}

function currentTheme(){
  return document.body.className.replace('theme-', '');
}

function closeGlobe(){
  document.getElementById('globeOverlay').style.display = 'none';
  if(window._globeInstance){
    cancelAnimationFrame(window._globeInstance.animId);
    window.removeEventListener('resize', window._globeInstance.onResize);
    window._globeInstance.renderer.dispose();
    window._globeInstance = null;
    document.getElementById('globeMount').innerHTML = '';
  }
}

    const rect=wrap.getBoundingClientRect();
    origRight  = window.innerWidth  - rect.right;
    origBottom = window.innerHeight - rect.bottom;
  });
  window.addEventListener('mousemove', e=>{
    if(!startX) return;
    const dx=Math.abs(e.clientX-startX), dy=Math.abs(e.clientY-startY);
    if(dx>4||dy>4) dragging=true;
    if(!dragging) return;
    const newRight  = Math.max(8, origRight  - (e.clientX-startX));
    const newBottom = Math.max(8, origBottom - (e.clientY-startY));
    wrap.style.right  = newRight  + 'px';
    wrap.style.bottom = newBottom + 'px';
    wrap.style.left   = 'auto';
  });
  window.addEventListener('mouseup', e=>{
    if(dragging){ e.stopPropagation(); }
    startX=null; dragging=false;
  });

  // 터치 드래그
  let tx,ty,or,ob;
  dot.addEventListener('touchstart', e=>{
    dragging=false;
    tx=e.touches[0].clientX; ty=e.touches[0].clientY;
    const rect=wrap.getBoundingClientRect();
    or=window.innerWidth-rect.right; ob=window.innerHeight-rect.bottom;
  },{passive:true});
  window.addEventListener('touchmove', e=>{
    if(!tx) return;
    const dx=Math.abs(e.touches[0].clientX-tx), dy=Math.abs(e.touches[0].clientY-ty);
    if(dx>4||dy>4) dragging=true;
    if(!dragging) return;
    wrap.style.right  = Math.max(8, or-(e.touches[0].clientX-tx))+'px';
    wrap.style.bottom = Math.max(8, ob-(e.touches[0].clientY-ty))+'px';
    wrap.style.left='auto';
  },{passive:true});
  window.addEventListener('touchend', ()=>{ if(!dragging && tx) toggleAssist(); tx=null; dragging=false; });
})();

window._album = []; // {src, name}
window._albumMode = null; // 'view' | 'pick' (photo-block에서 선택)
window._albumPickTarget = null; // 어떤 photo-block에 넣을지
window._albumSelected = new Set();

function openAlbum(mode='view', target=null){
  window._albumMode = mode;
  window._albumPickTarget = target;
  window._albumSelected.clear();
  renderAlbumGrid();
  document.getElementById('albumOverlay').classList.add('open');
  document.getElementById('albumSelectBar').classList.toggle('show', mode==='pick');
}
function closeAlbum(){
  document.getElementById('albumOverlay').classList.remove('open');
  window._albumSelected.clear();
}
function addToAlbum(input){
  if(!input.files) return;
  Array.from(input.files).forEach(file=>{
    const reader = new FileReader();
    reader.onload = e => {
      window._album.push({src:e.target.result, name:file.name});
      renderAlbumGrid();
    };
    reader.readAsDataURL(file);
  });
}
function renderAlbumGrid(){
  const grid = document.getElementById('albumGrid');
  document.getElementById('albumCount').textContent = window._album.length + '장';
  if(window._album.length === 0){
    grid.innerHTML = `<div class="album-empty t2">아직 사진이 없어요.<br>위 버튼으로 추가해보세요!</div>`;
    return;
  }
  grid.innerHTML = '';
  window._album.forEach((photo, idx)=>{
    const thumb = document.createElement('div');
    thumb.className = 'album-thumb' + (window._albumSelected.has(idx) ? ' selected' : '');
    thumb.innerHTML = `<img src="${photo.src}" loading="lazy">`;
    thumb.onclick = () => {
      if(window._albumMode === 'pick'){
        window._albumSelected.clear();
        window._albumSelected.add(idx);
      } else {
        if(window._albumSelected.has(idx)) window._albumSelected.delete(idx);
        else window._albumSelected.add(idx);
      }
      renderAlbumGrid();
    };
    grid.appendChild(thumb);
  });
}
function confirmAlbumSelect(){
  if(window._albumSelected.size === 0) return;
  const idx = [...window._albumSelected][0];
  const src = window._album[idx].src;
  if(window._albumPickTarget){
    // photo-block의 이미지 영역 업데이트
    const area = window._albumPickTarget.querySelector('.photo-upload-area');
    if(area){
      area.innerHTML = `<img class="photo-preview" src="${src}"><input type="file" accept="image/*" onchange="previewPhoto(this)" style="position:absolute;inset:0;opacity:0;cursor:pointer;">`;
      area.style.border = 'none';
    }
  }
  closeAlbum();
}

// ── WebGL 오로라 ──
(function(){
  const cv=document.getElementById('bg-aurora');
  function resize(){cv.width=window.innerWidth;cv.height=window.innerHeight;}
  resize();window.addEventListener('resize',resize);
  const gl=cv.getContext('webgl');if(!gl)return;
  const VS=`attribute vec2 p;void main(){gl_Position=vec4(p,0.,1.);}`;
  const FS=`
precision highp float;
uniform vec2 res;uniform float time;
float h21(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}
float noise(vec2 p){vec2 i=floor(p);vec2 f=fract(p);vec2 u=f*f*(3.-2.*f);return mix(mix(h21(i),h21(i+vec2(1,0)),u.x),mix(h21(i+vec2(0,1)),h21(i+vec2(1,1)),u.x),u.y);}
float fbm(vec2 p){float v=0.;float a=.5;for(int i=0;i<6;i++){v+=a*noise(p);p=p*2.1+vec2(.3,.7);a*=.48;}return v;}
void main(){
  vec2 uv=gl_FragCoord.xy/res;
  uv.y=1.-uv.y;
  float T=time*.10;
  // 배경
  vec3 col=mix(vec3(.003,.022,.055),vec3(.006,.035,.085),uv.y);
  // 별
  vec2 sgrid=uv*vec2(95.,66.);
  vec2 sid=floor(sgrid);vec2 soff=fract(sgrid);
  float sh=h21(sid);
  float sblink=.30+.70*sin(time*(sh*.8+.2)*1.4+sh*12.566);
  float smask=step(.962,sh)*sblink*smoothstep(.22,.0,length(soff-.5))*step(uv.y,.85);
  col+=vec3(.78,.86,1.)*smask*.80;

  // ── 오로라 S자 ──
  vec3 aurora=vec3(0.);
  for(int i=0;i<6;i++){
    float fi=float(i);
    float px=uv.x; // 0=왼쪽, 1=오른쪽

    // S자 경로: px 0→1 일때
    // y: 0.15(위) → 0.45(중간위) → 0.55(중간아래) → 0.85(아래)
    // 핵심: 앞반은 빠르게 내려오고, 중간에 느려지고, 뒷반에 다시 빠르게
    // 이게 진짜 S — cos를 0~2π 로 매핑하면 1→-1→1 인데
    // (1 - cos(px*2π)) / 2 = 0→1→0 (뒤집힌 U)
    // 우리가 원하는건 0→1인 전체 경로에서 중간에 꺾이는 S
    // y = px + A * sin(px * 2π)  <- 이게 진짜 S자!
    float sPath = px + 0.28 * sin(px * 6.28318); // S자 경로
    float sBase = sPath * 0.75 + 0.08;           // 전체 y범위: 0.08 ~ 0.83
    float sWave = sin(px * 3.5 - T * 0.5 + fi * 0.9) * 0.025
                + fbm(vec2(px * 1.5 + fi, T * 0.3)) * 0.035 - 0.017;
    float offset = (fi - 2.5) * 0.044;

    float cy = sBase + sWave + offset;
    float dy = uv.y - cy;

    // 두께
    float thick = 0.045 + 0.020 * fbm(vec2(px * 3.5 + fi * 1.4, T * 0.5));
    float gauss = exp(-dy*dy / (2.*thick*thick));

    // x페이드 (양 끝 자연스럽게)
    float xfade = smoothstep(.0,.06,px) * smoothstep(1.,.92,px);
    // 밝기 노이즈로 커튼 느낌
    float bright = 0.30 + 0.70 * fbm(vec2(px * 3.0 + fi * 2.0, T * 0.6));
    float band = gauss * xfade * bright;

    // 색상
    vec3 c;
    if(i==0)      c=vec3(.04,.92,.48);  // 밝은 초록
    else if(i==1) c=vec3(.0 ,.78,.75);  // 청록
    else if(i==2) c=mix(vec3(.55,.10,.92),vec3(.04,.90,.45),fbm(vec2(px*2.,T*.4))); // 보라↔초록
    else if(i==3) c=vec3(.88,.14,.55);  // 분홍
    else if(i==4) c=vec3(.65,.08,.90);  // 보라
    else          c=vec3(.0 ,.85,.50);  // 초록

    aurora += c * band * 0.62;
  }
  col += aurora;
  col += vec3(.0,.04,.02)*smoothstep(.9,.1,uv.y)*.5;
  col = pow(clamp(col,0.,1.),vec3(.88));
  gl_FragColor=vec4(col,1.);
}`;
  function mkS(t,s){const sh=gl.createShader(t);gl.shaderSource(sh,s);gl.compileShader(sh);if(!gl.getShaderParameter(sh,gl.COMPILE_STATUS))console.warn(gl.getShaderInfoLog(sh));return sh;}
  const prog=gl.createProgram();
  gl.attachShader(prog,mkS(gl.VERTEX_SHADER,VS));
  gl.attachShader(prog,mkS(gl.FRAGMENT_SHADER,FS));
  gl.linkProgram(prog);gl.useProgram(prog);
  const buf=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,buf);
  gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
  const aP=gl.getAttribLocation(prog,'p');gl.enableVertexAttribArray(aP);gl.vertexAttribPointer(aP,2,gl.FLOAT,false,0,0);
  const uRes=gl.getUniformLocation(prog,'res'),uTime=gl.getUniformLocation(prog,'time');
  const t0=Date.now();
  function frame(){
    gl.viewport(0,0,cv.width,cv.height);
    gl.uniform2f(uRes,cv.width,cv.height);
    gl.uniform1f(uTime,(Date.now()-t0)/1000);
    gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
    requestAnimationFrame(frame);
  }
  frame();
  window.addEventListener('resize',()=>{resize();gl.viewport(0,0,cv.width,cv.height);});
})();

// ── 밤하늘 별 ──
(function(){
  const cv=document.getElementById('bg-night');
  const ctx=cv.getContext('2d');
  function resize(){cv.width=window.innerWidth;cv.height=window.innerHeight;}
  resize();window.addEventListener('resize',resize);
  const stars=Array.from({length:200},()=>({x:Math.random(),y:Math.random()*.76,s:Math.random()*2.2+.9,sp:.16+Math.random()*.18,ph:Math.random()*Math.PI*2}));
  let t=0;
  function frame(){
    const W=cv.width,H=cv.height;
    ctx.clearRect(0,0,W,H);
    const bg=ctx.createRadialGradient(W*.4,H*.08,0,W*.5,H*.5,H*.9);
    bg.addColorStop(0,'#121838');bg.addColorStop(.5,'#080c24');bg.addColorStop(1,'#03051a');
    ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
    ctx.save();ctx.translate(W*.5,H*.3);ctx.rotate(-.25);
    const mw=ctx.createLinearGradient(-W*.5,0,W*.5,0);
    mw.addColorStop(0,'rgba(140,160,255,0)');mw.addColorStop(.5,'rgba(160,180,255,0.07)');mw.addColorStop(1,'rgba(140,160,255,0)');
    ctx.fillStyle=mw;ctx.fillRect(-W*.5,-H*.14,W,H*.28);ctx.restore();
    stars.forEach(s=>{
      const a=.12+.75*(Math.sin(t*s.sp+s.ph)*.5+.5);
      ctx.fillStyle=`rgba(225,232,255,${a.toFixed(2)})`;
      ctx.fillRect(s.x*W,s.y*H,s.s,s.s);
    });
    t+=.020;requestAnimationFrame(frame);
  }
  frame();
})();

window.addEventListener('load',function(){
  window._map=L.map('map',{center:[30,20],zoom:2,minZoom:2,maxZoom:16});
  window._mg=L.layerGroup().addTo(window._map);
  window._tl=L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:19}).addTo(window._map);
  trips.forEach(addMarker);renderList();
  window.saveTrip=function(){
    const city=document.getElementById('inCity').value.trim();
    const cityEn=document.getElementById('inCityEn').value.trim();
    const date=document.getElementById('inDate').value.trim();
    const blog=document.getElementById('inBlog').value.trim();
    const moodEl=document.querySelector('.mood-pill-editor.sel');
    if(!city){alert('여행지를 입력해주세요.');return;}

    // 일정 + 사진 블록 수집
    const allBlocks = document.querySelectorAll('#scheduleList .schedule-block, #scheduleList .photo-block');
    const dayEvents = [];
    allBlocks.forEach(block => {
      if(block.classList.contains('schedule-block')){
        const text = block.querySelector('.schedule-text').value.trim();
        const blog = block.querySelector('.schedule-blog-input').value.trim();
        const icon = block.querySelector('.schedule-icon').textContent;
        if(text) dayEvents.push({type:'event', icon, text, blog: blog||''});
      } else {
        const img = block.querySelector('img.photo-preview');
        const caption = block.querySelector('.photo-block-caption').value.trim();
        if(img||caption) dayEvents.push({type:'photo', src: img?img.src:'', caption: caption||''});
      }
    });
    const timeline = dayEvents.length > 0 ? [{day:'일정', events:dayEvents}] : [];

    fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(cityEn||city)}&format=json&limit=1`)
      .then(r=>r.json()).then(data=>{
        const lat=data[0]?parseFloat(data[0].lat):20,lng=data[0]?parseFloat(data[0].lon):0;
        const trip={
          id:Date.now(), city, cityEn:cityEn||city,
          country:data[0]?.display_name?.split(',').pop()?.trim()||'',
          flag:'🌍', lat, lng,
          date:date||new Date().toISOString().slice(0,7).replace('-','.'),
          duration:'', photos:0, days:0,
          gradient:GRADS[trips.length%GRADS.length],
          coverPhoto: window._coverPhotoSrc||null,
          albumPhotos: [...window._album],
          fc:FC[trips.length%FC.length],
          quote: blog ? blog.slice(0,60)+(blog.length>60?'...':'') : '새로운 여행의 시작.',
          quoteAttr:`${city}에서`,
          timeline,
          memo: blog||'아직 작성된 이야기가 없어요.',
          mood:moodEl?moodEl.textContent:'설렘'
        };
        trips.unshift(trip);
        addMarker(trip);
        renderList();
        window._map.flyTo([lat,lng],6,{duration:1.6});
        closeEditor();
      }).catch(()=>{
        // 오프라인이어도 추가
        const trip={
          id:Date.now(), city, cityEn:cityEn||city, country:'', flag:'🌍', lat:20, lng:0,
          date:date||'2025', duration:'', photos:0, days:0,
          gradient:GRADS[trips.length%GRADS.length], fc:FC[trips.length%FC.length],
          quote: blog?blog.slice(0,60):'새로운 여행의 시작.',
          quoteAttr:`${city}에서`, timeline,
          memo:blog||'아직 작성된 이야기가 없어요.',
          mood:moodEl?moodEl.textContent:'설렘'
        };
        trips.unshift(trip); addMarker(trip); renderList(); closeEditor();
      });
  };
});

function addMarker(t){
  const pin = window._pinIcon || '📍';
  const useEmoji = pin !== '📍'; // 이모지면 이모지로, 기본 핀이면 dot 스타일
  const iconHtml = useEmoji
    ? `<div class="wand-marker"><div style="font-size:22px;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.3));">${pin}</div><div class="wand-label">${t.city}</div></div>`
    : `<div class="wand-marker"><div class="wand-dot"></div><div class="wand-label">${t.city}</div></div>`;
  const icon=L.divIcon({html:iconHtml,className:'',iconSize:[80,50],iconAnchor:[40,useEmoji?26:13]});
  const m=L.marker([t.lat,t.lng],{icon});m.on('click',()=>openDetail(t.id));window._mg.addLayer(m);
}
function renderList(){
  const list=document.getElementById('tripList');list.innerHTML='';
  document.getElementById('lC').textContent=trips.length ? trips.length+'개' : '';
  document.getElementById('sP').textContent=trips.reduce((s,t)=>s+t.photos,0);
  document.getElementById('sD').textContent=trips.reduce((s,t)=>s+t.days,0);
  document.getElementById('sC').textContent=[...new Set(trips.map(t=>t.country))].length;

  if(trips.length === 0){
    list.innerHTML=`
      <div class="empty-state">
        <div class="empty-icon">🌍</div>
        <div class="t1" style="font-size:14px;font-weight:500;">아직 여행 기록이 없어요</div>
        <div class="t2" style="font-size:12px;text-align:center;line-height:1.6;opacity:.70;">첫 번째 여행을 추가해보세요<br>✦ 버튼을 눌러 시작하세요</div>
      </div>`;
    return;
  }
  trips.forEach((t,i)=>{
    const fc=FC[i%FC.length][0];
    const row=document.createElement('div');row.className='trip-row card';
    // 커버사진 있으면 썸네일로
    const thumbStyle = t.coverPhoto
      ? `background:url(${t.coverPhoto}) center/cover no-repeat`
      : `background:linear-gradient(135deg,${fc[0]},${fc[1]})`;
    row.innerHTML=`<div class="trip-thumb" style="${thumbStyle}"></div><div class="trip-info"><div class="trip-name t3">${t.flag} ${t.city}</div><div class="trip-meta t2">${t.date} · ${t.duration}</div></div><div class="trip-chevron">›</div>`;
    row.onclick=()=>openDetail(t.id);list.appendChild(row);
  });
}
function openDetail(id){
  const t=trips.find(x=>x.id===id);if(!t)return;
  _currentDetailTrip = t;
  const heroBg = document.getElementById('heroBg');
  if(t.coverPhoto){
    heroBg.style.backgroundImage=`url(${t.coverPhoto})`;
    heroBg.style.backgroundSize='cover';
    heroBg.style.backgroundPosition='center';
    heroBg.style.background='';
  } else {
    heroBg.style.backgroundImage='';
    heroBg.style.background=t.gradient;
  }
  document.getElementById('heroVol').textContent=`Vol.0${trips.indexOf(t)+1} · ${t.date} · ${t.country}`;
  document.getElementById('heroTitle').innerHTML=`<div class="hero-city">${t.city}<span class="hero-city-en">${t.cityEn}</span></div>`;
  document.getElementById('heroDates').textContent=`${t.date} · ${t.duration} · 사진 ${t.photos}장`;
  document.getElementById('dQ').textContent=`"${t.quote}"`;
  document.getElementById('dQA').textContent=`— ${t.quoteAttr}`;
  const strip=document.getElementById('filmStrip');strip.innerHTML='';
  // 커버사진 + 스레드에서 업로드된 사진들 수집
  const photos = [];
  if(t.coverPhoto) photos.push(t.coverPhoto);
  t.timeline.forEach(day=>day.events.forEach(e=>{ if(e.type==='photo'&&e.src) photos.push(e.src); }));
  if(photos.length > 0){
    // 실제 사진으로 필름스트립 채우기
    const frames = photos.length < 4 ? [...photos, ...t.fc.slice(0, 4-photos.length).map(fc=>null)] : photos.slice(0,4);
    frames.forEach((src, i)=>{
      const f=document.createElement('div');f.className='film-frame';
      if(src){
        f.innerHTML=`<div style="width:100%;height:100%;background:url(${src}) center/cover no-repeat"></div>`;
      } else {
        const fc=t.fc[i%t.fc.length];
        f.innerHTML=`<div style="width:100%;height:100%;background:linear-gradient(135deg,${fc[0]},${fc[1]})"></div>`;
      }
      strip.appendChild(f);
    });
  } else {
    t.fc.forEach(fc=>{const f=document.createElement('div');f.className='film-frame';f.innerHTML=`<div style="width:100%;height:100%;background:linear-gradient(135deg,${fc[0]},${fc[1]})"></div>`;strip.appendChild(f);});
  }
  const tl=document.getElementById('dTL'); tl.innerHTML='';
  t.timeline.forEach(day=>{
    const dayDiv = document.createElement('div');
    if(day.day !== '일정'){
      dayDiv.innerHTML=`<div class="tl-day-lbl t2" style="margin-bottom:12px;">${day.day}</div>`;
    }
    const threadWrap = document.createElement('div');
    threadWrap.className = 'thread-wrap';
    day.events.forEach((e, ei)=>{
      const isLast = ei === day.events.length - 1;
      const item = document.createElement('div');
      item.className = 'thread-item';

      if(e.type === 'photo'){
        // 사진 블록 — 아바타 없이 full width
        item.innerHTML = `
          <div class="thread-left">
            <div class="thread-avatar">📷</div>
            ${!isLast ? `<div class="thread-line"></div>` : ''}
          </div>
          <div class="thread-right">
            <div class="thread-photo-wrap">
              ${e.src ? `<img class="thread-photo" src="${e.src}">` : ''}
              ${e.caption ? `<div class="thread-photo-caption">${e.caption}</div>` : ''}
            </div>
          </div>
        `;
      } else {
        item.innerHTML = `
          <div class="thread-left">
            <div class="thread-avatar">${e.icon||'📍'}</div>
            ${!isLast || e.blog ? `<div class="thread-line"></div>` : ''}
          </div>
          <div class="thread-right">
            <div class="thread-event-label t3">${e.text}</div>
            ${e.blog ? `<div class="thread-blog-bubble">${e.blog}</div>` : ''}
          </div>
        `;
      }
      threadWrap.appendChild(item);
    });
    dayDiv.appendChild(threadWrap);
    tl.appendChild(dayDiv);
  });
  const grid=document.getElementById('dPG');grid.innerHTML='';
  t.fc.slice(0,3).forEach((fc,i)=>{const item=document.createElement('div');item.className='pg-item'+(i===0?' tall':'');item.style.background=`linear-gradient(135deg,${fc[0]},${fc[1]})`;grid.appendChild(item);});
  document.getElementById('dM').innerHTML=`<div class="memo-card card"><div class="memo-lbl t2">여행 메모</div><div class="memo-text t1">${t.memo}</div><span class="memo-mood">${t.mood}</span></div>`;
  document.getElementById('screen-map').style.display='none';
  const det=document.getElementById('screen-detail');det.style.display='flex';det.scrollTop=0;
  det.classList.add('screen-enter');setTimeout(()=>det.classList.remove('screen-enter'),380);
}
</script>
</body>
</html>
